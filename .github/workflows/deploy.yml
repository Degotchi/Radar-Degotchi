name: Deploy Radar

on:
  push:
    branches:
      - master
      - main
  workflow_dispatch:

concurrency:
  group: radar-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Install deploy tools
        run: sudo apt-get update && sudo apt-get install -y rsync

      - name: Configure SSH
        env:
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$DEPLOY_SSH_KEY" > ~/.ssh/radar_deploy_key
          chmod 600 ~/.ssh/radar_deploy_key
          for attempt in 1 2 3 4 5; do
            ssh-keyscan -T 10 -p "$DEPLOY_PORT" "$DEPLOY_HOST" >> ~/.ssh/known_hosts && break
            sleep 5
          done

      - name: Sync files
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
        run: |
          set -euo pipefail
          SSH_OPTS="-i ~/.ssh/radar_deploy_key -o IdentitiesOnly=yes -o StrictHostKeyChecking=yes -o ConnectTimeout=20 -p $DEPLOY_PORT"
          for attempt in 1 2 3 4 5; do
            ssh $SSH_OPTS "$DEPLOY_USER@$DEPLOY_HOST" "mkdir -p /opt/radar" && break
            sleep 8
          done
          for attempt in 1 2 3; do
            rsync -az --delete \
              -e "ssh $SSH_OPTS" \
              --exclude '.git/' \
              --exclude '.github/' \
              --exclude '.cache/' \
              --exclude '.env' \
              --exclude '.env.*' \
              --exclude '.playwright-cli/' \
              --exclude 'node_modules/' \
              --exclude 'output/' \
              ./ "$DEPLOY_USER@$DEPLOY_HOST:/opt/radar/" && break
            sleep 8
          done

      - name: Restart service
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
        run: |
          set -euo pipefail
          SSH_OPTS="-i ~/.ssh/radar_deploy_key -o IdentitiesOnly=yes -o StrictHostKeyChecking=yes -o ConnectTimeout=20 -p $DEPLOY_PORT"
          for attempt in 1 2 3 4 5; do
            ssh $SSH_OPTS "$DEPLOY_USER@$DEPLOY_HOST" 'bash -s' <<'REMOTE' && break
            set -euo pipefail
            cd /opt/radar
            npm ci --omit=dev
            if pm2 describe ainews >/dev/null 2>&1; then
              pm2 delete ainews || true
            fi
            if pm2 describe radar >/dev/null 2>&1; then
              pm2 restart radar --update-env
            else
              pm2 start ecosystem.config.cjs --env production
            fi
            pm2 save
            proxy_dir="/var/lib/docker/volumes/degotchi_npm_data/_data/nginx/proxy_host"
            mkdir -p "$proxy_dir"
            {
              printf '%s\n' '# ------------------------------------------------------------'
              printf '%s\n' '# radar.degotchi.com'
              printf '%s\n' '# ------------------------------------------------------------'
              printf '%s\n' ''
              printf '%s\n' 'server {'
              printf '%s\n' '  set $forward_scheme http;'
              printf '%s\n' '  set $server         "172.17.0.1";'
              printf '%s\n' '  set $port           8787;'
              printf '%s\n' ''
              printf '%s\n' '  listen 80;'
              printf '%s\n' '  listen [::]:80;'
              printf '%s\n' ''
              printf '%s\n' '  server_name radar.degotchi.com;'
              printf '%s\n' '  http2 on;'
              printf '%s\n' ''
              printf '%s\n' '  include conf.d/include/letsencrypt-acme-challenge.conf;'
              printf '%s\n' '  include conf.d/include/block-exploits.conf;'
              printf '%s\n' ''
              printf '%s\n' '  client_max_body_size 20m;'
              printf '%s\n' '  proxy_read_timeout 300s;'
              printf '%s\n' '  proxy_send_timeout 300s;'
              printf '%s\n' ''
              printf '%s\n' '  access_log /data/logs/proxy-host-7_access.log proxy;'
              printf '%s\n' '  error_log /data/logs/proxy-host-7_error.log warn;'
              printf '%s\n' ''
              printf '%s\n' '  location / {'
              printf '%s\n' '    proxy_set_header Upgrade $http_upgrade;'
              printf '%s\n' '    proxy_set_header Connection $http_connection;'
              printf '%s\n' '    proxy_http_version 1.1;'
              printf '%s\n' '    include conf.d/include/proxy.conf;'
              printf '%s\n' '  }'
              printf '%s\n' '}'
            } > "$proxy_dir/7.conf"
            if docker ps --format '{{.Names}}' | grep -qx 'de_npm'; then
              docker exec de_npm nginx -t
              docker exec de_npm nginx -s reload
            fi
            curl -fsS http://127.0.0.1:8787/api/health >/dev/null
          REMOTE
            sleep 8
          done
